name: Pull Request Tests

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn -DtestTags=integration test
